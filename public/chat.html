<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="62x62" href="img/iana-avatar.png">
    <title>Iana</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>

    <div class="app-container">

        <aside class="sidebar" id="sidebar">

            <div class="sidebar-header">

                <div class="sidebar-brand-wrapper">

                    <img src="img/iana-avatar.png" class="sidebar-avatar-brand" alt="Iana">

                    <span class="brand-name-sidebar">
                        Iana
                    </span>

                    <button class="sidebar-toggle-btn" id="sidebar-toggle">

                        <span class="menu-icon">☰</span>

                    </button>

                </div>

            </div>

            <div class="sidebar-top">

                <button class="new-chat-btn" id="btn-nova-conversa">

                    <img src="img/escrever.png" class="icon-escrever" alt="Novo Chat">

                    <span>Novo Chat</span>

                </button>

                <button class="search-chat-btn" id="btn-abrir-pesquisa">

                    <img src="img/lupa.png" style="width:16px; filter:invert(.7);">

                    <span>Buscar Chat</span>

                </button>

            </div>

            <div id="history-container"></div>

            <div class="sidebar-footer" id="user-profile-section" style="display:none;">

                <div class="user-session-row">

                    <div class="user-session-info">

                        <img src="img/iana-avatar.png" class="user-session-avatar" alt="Usuário">

                        <span id="sidebar-user-name">
                            Nome do Usuário
                        </span>

                    </div>

                    <button class="btn-pontos" id="btn-user-menu">

                        <img src="img/points.png" class="icon-points" alt="Opções">

                    </button>

                    <div class="pontos-dropdown" id="user-dropdown">

                        <button class="pontos-item" id="btn-abrir-feedback">

                            Enviar Feedback

                        </button>

                        <button class="pontos-item btn-sair-dropdown" id="btn-logout">

                            Sair

                        </button>

                    </div>

                </div>

            </div>

        </aside>

        <main class="chat-main">

            <header class="top-header">

                <div class="header-left"></div>

                <div class="user-auth" id="user-auth-header">

                    <button class="btn-login" id="btn-trigger-login">

                        Entrar

                    </button>

                    <button class="btn-signup" id="btn-trigger-signup">

                        Registrar

                    </button>

                </div>

            </header>

            <div class="chat-screen-layout">

                <div id="chat-box">

                    <div class="welcome-container" id="welcome-view">

                        <img src="img/iana-avatar.png" class="iana-rosto-inicio" alt="Iana">

                        <h1 id="user-greeting">
                            <span class="gradient-text">
                                Olá! Que bom que chegou 👋
                            </span>
                        </h1>

                        <p id="help-question">
                            Como posso te ajudar hoje?
                        </p>

                    </div>

                    

                </div>

                <div class="input-area-wrapper">

                    <div class="input-area">

                        <div class="search-pill">

                            <button id="btn-upload-trigger" type="button" class="pill-action-btn"
                                title="Anexar arquivo">

                                <img src="img/mais.png" style="width:22px;" alt="Anexar">

                            </button>

                            <input type="file" id="file-input" style="display:none;" accept="image/*,.pdf,.txt">

                            <textarea id="chat-input" placeholder="Peça à Iana..." rows="1"></textarea>

                            <button id="btn-audio-record" type="button" class="pill-action-btn" title="Gravar áudio">

                                <img src="img/microfone.png" style="width:20px;" alt="Gravar">

                            </button>

                            <button id="btn-stop-response" type="button" class="pill-action-btn" style="display:none;"
                                title="Parar resposta">

                                <img src="img/seta-para-cima.png" style="width:18px;" alt="Parar">

                            </button>


                            <button id="send-btn" type="button" title="Enviar">

                                <img src="img/send-message.svg" alt="Enviar">

                            </button>

                        </div>

                    </div>

                    <p class="chat-disclaimer">
                        Iana é uma IA e pode cometer erros.
                        Verifique as respostas.
                    </p>

                </div>

            </div>

        </main>

    </div>

    <div class="modal-overlay" id="modal-overlay" style="display:none;">

        <div class="modal-box">

            <!-- ── LOGIN ───────────────────────── -->
            <div class="modal-content" id="tela-login" style="display:none;">

                <button class="modal-close" id="btn-fechar-login">✕</button>

                <h2>Entrar</h2>

                <input type="email" id="login-email" placeholder="Seu e-mail">

                <input type="password" id="login-senha" placeholder="Sua senha">

                <p id="login-erro" class="erro-msg"></p>

                <button class="btn-modal-primary" id="btn-efetuar-login">
                    Entrar
                </button>

                <button class="btn-link-modal" onclick="mostrarTela('tela-esqueci')">
                    Esqueci minha senha
                </button>

            </div>

            <!-- ── CADASTRO ────────────────────── -->
            <div class="modal-content" id="tela-cadastro" style="display:none;">

                <button class="modal-close" id="btn-fechar-cadastro">✕</button>

                <h2>Criar Conta</h2>

                <input type="text" id="cadastro-nome" placeholder="Seu nome">

                <input type="email" id="cadastro-email" placeholder="Seu e-mail">

                <input type="password" id="cadastro-senha" placeholder="Sua senha">

                <p id="cadastro-erro" class="erro-msg"></p>

                <button class="btn-modal-primary" id="btn-efetuar-cadastro">
                    Registrar
                </button>

            </div>

            <!-- ── ESQUECI SENHA ───────────────── -->
            <div class="modal-content" id="tela-esqueci" style="display:none;">

                <button class="modal-close" id="btn-fechar-esqueci">✕</button>

                <h2>Recuperar Senha</h2>

                <input type="email" id="esq-email" placeholder="Seu e-mail">

                <p id="esq-erro" class="erro-msg"></p>

                <button class="btn-modal-primary" id="btn-enviar-codigo">
                    Enviar Código
                </button>

            </div>

            <!-- ── CÓDIGO ──────────────────────── -->
            <div class="modal-content" id="tela-codigo" style="display:none;">

                <button class="modal-close" id="btn-fechar-codigo">✕</button>

                <h2>Alterar Senha</h2>

                <p id="esq-email-label"></p>

                <input type="text" id="esq-codigo" placeholder="Código recebido">

                <input type="password" id="esq-nova-senha" placeholder="Nova senha">

                <p id="codigo-erro" class="erro-msg"></p>

                <button class="btn-modal-primary" id="btn-mudar-senha">
                    Alterar Senha
                </button>

            </div>

            <!-- ── PESQUISA ────────────────────── -->
            <div class="modal-content" id="tela-pesquisa" style="display:none;">

                <button class="modal-close" id="btn-fechar-pesquisa">✕</button>

                <h2>Buscar Conversa</h2>

                <input type="text" id="pesquisa-input" placeholder="Digite o nome da conversa">

                <div id="pesquisa-resultados"></div>

            </div>

            <!-- ── FEEDBACK ────────────────────── -->
            <div class="modal-content" id="tela-feedback" style="display:none;">

                <button class="modal-close" id="btn-fechar-feedback">✕</button>

                <h2>Enviar Feedback</h2>

                <input type="text" id="feedback-assunto" placeholder="Assunto">

                <textarea id="feedback-texto" placeholder="Digite seu feedback"></textarea>

                <label class="checkbox-feedback">
                    <input type="checkbox" id="feedback-autoriza">
                    Autorizo o uso deste feedback para melhorias da plataforma
                </label>

                <div class="feedback-actions">

                    <button class="btn-feedback-sec" id="btn-capturar-tela">
                        Capturar Tela
                    </button>

                    <button class="btn-modal-primary" id="btn-enviar-feedback">
                        Enviar
                    </button>

                </div>

            </div>

            <!-- ── RENOMEAR ────────────────────── -->
            <div class="modal-content" id="tela-renomear" style="display:none;">

                <button class="modal-close" id="btn-fechar-renomear">✕</button>

                <h2>Renomear Conversa</h2>

                <input type="text" id="rename-input" placeholder="Novo nome da conversa">

                <button class="btn-modal-primary" id="btn-confirmar-renomear">
                    Salvar
                </button>

            </div>

            <!-- ── CONFIRMAÇÃO ─────────────────── -->
            <div class="modal-content" id="tela-confirmacao" style="display:none;">

                <h2 class="modal-titulo">
                    Confirmar ação
                </h2>

                <p class="modal-msg">
                    Deseja continuar?
                </p>

                <div class="confirm-actions">

                    <button class="btn-cancelar" id="btn-cancelar-acao">
                        Cancelar
                    </button>

                    <button class="btn-confirmar" id="btn-confirmar-acao">
                        Confirmar
                    </button>

                </div>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="js/features.js"></script>

<script src="js/chat.js"></script>

</body>

</html>
