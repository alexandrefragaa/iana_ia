<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iana dos Games</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">

        <nav class="sidebar">
            <div class="sidebar-top">
                <button class="new-chat-btn" onclick="abrirNovaConversa()"><span>+</span> Nova Conversa</button>
            </div>
            <div id="history-container"
                style="flex: 1; overflow-y: auto; margin-top: 20px; display: flex; flex-direction: column; gap: 8px;">
            </div>
            <div class="sidebar-footer">Configurações</div>
        </nav>

        <main class="chat-main" style="flex: 1; display: flex; flex-direction: column;">
            <header class="top-header">
                <div class="brand-name">Iana</div>
                <div class="user-auth">
                    <button class="btn-login">Entrar</button>
                    <button class="btn-signup">Registrar</button>
                </div>
            </header>

            <div id="chat-screen" class="open-screen"
                style="flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden;">

                <div id="chat-box" class="chat-area"
                    style="display: none; flex: 1; overflow-y: auto; padding: 20px;"></div>

                <div class="welcome-container"
                    style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <img src="/img/iana-avatar.png" alt="IANA PERFIL" class="iana-rosto-inicio">
                    <h1 id="user-greeting">Conheça a Iana, sua assistente de IA para jogos</h1>
                    <p id="help-question">Precisa de ajuda com alguma conquista?</p>
                </div>

                <div class="input-area" style="flex-shrink: 0; padding: 20px;">
                    <div class="search-pill"
                        style="display: flex; align-items: flex-end; background: #2a2b2e; border-radius: 20px; padding: 10px;">
                        <textarea id="user-input" placeholder="Peça à Iana..." rows="1"
                            style="width: 100%; background: transparent; border: none; outline: none; color: white; resize: none; font-family: sans-serif; padding: 5px;"></textarea>
                        <button id="send-btn" style="background: none; border: none; cursor: pointer; padding: 5px;">
                            <img src="/img/send-message.png" alt="Botão Enviar" style="width: 24px;">
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="modal-renomear"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000;">
        <div
            style="background:#1e1f20; padding:20px; border-radius:10px; width:300px; color:white; border: 1px solid #333;">
            <h3 style="margin-bottom: 15px;">Renomear Conversa</h3>
            <input type="text" id="input-novo-titulo" placeholder="Novo nome..."
                style="width:100%; padding:8px; margin-bottom:15px; background:#151515; border:1px solid #333; color:white; border-radius: 5px;">
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="fecharModal()"
                    style="background:transparent; color:white; border:none; cursor:pointer;">Cancelar</button>
                <button onclick="salvarNovoTitulo()"
                    style="background:#a855f7; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Renomear</button>
            </div>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>

</html>
